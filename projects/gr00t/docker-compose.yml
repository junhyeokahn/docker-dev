services:
  gr00t-dev-jahn:
    extends:
      file: ../../compose.base.yml
      service: dev

    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}

    gpus: all
    network_mode: host

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      WANDB_API_KEY: "${WANDB_API_KEY}"
      HF_HOME: "${HF_HOME}"
      HF_TOKEN: "${HF_TOKEN}"
      HF_ENABLE_PARALLEL_LOADING: "YES"
      HF_PARALLEL_LOADING_WORKERS: 4

    volumes:
      # Persist the Python virtual environment across container restarts.
      - type: volume
        source: venv
        target: ${WORKDIR}/.venv
        volume:
          nocopy: true

    post_start:
      - command: chown -R ${DEV_UID}:${DEV_GID} ${WORKDIR}/.venv
        user: root

volumes:
  venv:
